name = "Djot"
grammar = "djot"
path_suffixes = ["djot"]
line_comments = ["% "]
autoclose_before = ";:.,=}])>"
word_characters = ["-", "_"]

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "("
end = ")"
close = true
newline = true

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string"]

[[brackets]]
start = "_"
end = "_"
close = false
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "*"
end = "*"
close = false
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "`"
end = "`"
close = false
newline = false
not_in = ["string"]
